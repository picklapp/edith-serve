server.port=9093
spring.application.name=edith-bank-backend

# SAML IdP Configuration
saml.idp.entity-id=http://localhost:5000/saml/metadata
saml.idp.cert-path=classpath:saml/bank-idp-cert.pem
saml.idp.key-path=classpath:saml/bank-idp-key.pem

# Registered Service Provider (edith-core)
saml.sp.core.entity-id=http://localhost:3000/saml/metadata
saml.sp.core.acs-url=http://localhost:3000/saml/acs
