server.port=9090
spring.application.name=edith-core-backend

# =============================================================
# SAML IdP Configuration (edith-core signs assertions for SPs)
# =============================================================
saml.idp.entity-id=http://localhost:3000/saml/metadata
saml.idp.cert-path=classpath:saml/idp-cert.pem
saml.idp.key-path=classpath:saml/idp-key.pem

# =============================================================
# Registered Service Providers (outbound SSO targets)
#
# To add a new SP, just add two lines:
#   saml.sp.providers.<name>.entity-id=<SP entity ID>
#   saml.sp.providers.<name>.acs-url=<SP ACS URL>
#
# No Java code changes needed. Restart the backend to pick up.
# =============================================================
saml.sp.providers.rdc.entity-id=http://localhost:4000/saml/metadata
saml.sp.providers.rdc.acs-url=http://localhost:4000/saml/acs

saml.sp.providers.ach.entity-id=http://localhost:4001/saml/metadata
saml.sp.providers.ach.acs-url=http://localhost:4001/saml/acs

# --- Example: adding a new SP (uncomment to enable) ---
# saml.sp.providers.wire.entity-id=https://wire.edith.com/saml/metadata
# saml.sp.providers.wire.acs-url=https://wire.edith.com/saml/acs
#
# saml.sp.providers.billpay.entity-id=https://billpay.edith.com/saml/metadata
# saml.sp.providers.billpay.acs-url=https://billpay.edith.com/saml/acs

# =============================================================
# edith-core as SP (receiving SSO from external IdPs)
# =============================================================
saml.core-sp.entity-id=http://localhost:3000/saml/metadata

# =============================================================
# Trusted Identity Providers (inbound SSO sources)
#
# To trust a new IdP, add three lines:
#   saml.trusted-idps.providers.<name>.entity-id=<IdP entity ID>
#   saml.trusted-idps.providers.<name>.cert-path=classpath:saml/<idp-cert>.pem
#
# Then place the IdP's public certificate in src/main/resources/saml/
# No Java code changes needed. Restart the backend to pick up.
# =============================================================
saml.trusted-idps.providers.edith-bank.entity-id=http://localhost:5000/saml/metadata
saml.trusted-idps.providers.edith-bank.cert-path=classpath:saml/bank-idp-cert.pem

saml.trusted-idps.providers.jarvis-bank.entity-id=http://localhost:5001/saml/metadata
saml.trusted-idps.providers.jarvis-bank.cert-path=classpath:saml/jarvis-idp-cert.pem

# --- Example: trusting a new IdP (uncomment to enable) ---
# saml.trusted-idps.providers.meridian-bank.entity-id=https://sso.meridianbank.com/saml/metadata
# saml.trusted-idps.providers.meridian-bank.cert-path=classpath:saml/meridian-idp-cert.pem
